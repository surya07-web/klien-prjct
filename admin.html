<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex">

  <!-- Sidebar -->
  <aside class="w-64 bg-blue-900 text-white min-h-screen p-4">
    <h2 class="text-xl font-bold mb-6">Admin</h2>
    <ul>
      <li class="mb-2"><a href="#" class="block p-2 hover:bg-blue-700 rounded">Dashboard</a></li>
      <li><a href="#" class="block p-2 bg-blue-700 rounded">Mahasiswa</a></li>
    </ul>
  </aside>

  <!-- Content -->
  <main class="flex-1 p-6">

    <!-- Header -->
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-xl font-bold">Mahasiswa</h1>
      <button onclick="openModal()" class="bg-blue-600 text-white px-4 py-2 rounded">
        + Tambah Mahasiswa
      </button>
    </div>

    <!-- Table -->
    <table class="w-full bg-white rounded shadow">
      <thead class="bg-blue-600 text-white">
        <tr>
          <th class="p-2">NIM</th>
          <th class="p-2">Nama</th>
          <th class="p-2">Aksi</th>
        </tr>
      </thead>
      <tbody>
        <tr class="text-center border-t">
          <td class="p-2">20211001</td>
          <td class="p-2">Budi</td>
          <td class="p-2 space-x-2">
            <button class="bg-yellow-400 px-2 py-1 rounded">Edit</button>
            <button class="bg-red-500 text-white px-2 py-1 rounded">Hapus</button>
          </td>
        </tr>
      </tbody>
    </table>

  </main>
</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
  <div class="bg-white p-6 rounded-lg w-80">
    <h2 class="text-lg font-bold mb-4">Tambah Mahasiswa</h2>
    <input type="text" placeholder="NIM" class="w-full mb-3 p-2 border rounded">
    <input type="text" placeholder="Nama" class="w-full mb-3 p-2 border rounded">
    <div class="flex justify-end space-x-2">
      <button onclick="closeModal()" class="px-3 py-1 bg-gray-400 rounded">Batal</button>
      <button class="px-3 py-1 bg-blue-600 text-white rounded">Simpan</button>
    </div>
  </div>
</div>

<script>
function openModal() {
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal').classList.add('flex');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  document.getElementById('modal').classList.remove('flex');
}
</script>

</body>
</html>
